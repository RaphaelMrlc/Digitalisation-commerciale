<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Assistant Commercial Paris</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root {
            --c-bg: #0f0a0e;
            --c-card: #1c1219;
            --c-card2: #241820;
            --c-border: rgba(255,255,255,0.07);
            --c-gold: #c9a84c;
            --c-gold-l: #f0d080;
            --c-red: #8b2035;
            --c-red-l: #c0394e;
            --c-green: #2e7d52;
            --c-green-l: #4caf81;
            --c-blue: #1e4a8b;
            --c-blue-l: #5b9cf6;
            --c-text: #f0e8e0;
            --c-muted: rgba(240,232,224,0.45);
            --radius: 16px;
            --radius-sm: 10px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; background: var(--c-bg); color: var(--c-text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; }

        /* Switcher */
        .switcher { position: fixed; top: 0; left: 0; right: 0; z-index: 999; display: flex; gap: 8px; padding: 14px 16px 10px; background: linear-gradient(to bottom, rgba(15,10,14,0.98) 70%, transparent); }
        .sw-btn { flex: 1; padding: 9px 6px; border: 1px solid var(--c-border); background: var(--c-card); color: var(--c-muted); border-radius: 22px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all .25s; }
        .sw-btn.active { color: var(--c-bg); border-color: transparent; }
        .sw-btn.matin.active { background: var(--c-blue-l); }
        .sw-btn.rdv.active { background: var(--c-gold); }
        .sw-btn.soir.active { background: var(--c-green-l); }

        /* Screens */
        .screen { display: none; padding: 72px 0 28px; height: 100vh; overflow-y: auto; }
        .screen.active { display: block; }
        .pad { padding: 0 16px; }

        /* Header */
        .screen-header { margin-bottom: 16px; padding: 0 16px; }
        .eyebrow { font-size: 10px; letter-spacing: .18em; text-transform: uppercase; color: var(--c-muted); margin-bottom: 4px; }
        .screen-header h1 { font-size: 24px; font-weight: 700; line-height: 1.15; }
        .screen-header .sub { font-size: 13px; color: var(--c-muted); margin-top: 3px; }
        .accent-matin { border-bottom: 2px solid var(--c-blue-l); padding-bottom: 12px; }
        .accent-rdv { border-bottom: 2px solid var(--c-gold); padding-bottom: 12px; }
        .accent-soir { border-bottom: 2px solid var(--c-green-l); padding-bottom: 12px; }

        /* Cards */
        .card { background: var(--c-card); border: 1px solid var(--c-border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
        .mx { margin-left: 16px; margin-right: 16px; }
        .card-title { font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: var(--c-muted); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
        .card-title::before { content: ''; display: block; width: 3px; height: 14px; border-radius: 3px; }
        .blue .card-title::before { background: var(--c-blue-l); }
        .gold .card-title::before { background: var(--c-gold); }
        .green .card-title::before { background: var(--c-green-l); }
        .red .card-title::before { background: var(--c-red-l); }

        /* Stats */
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
        .stat-box { background: var(--c-card2); border-radius: var(--radius-sm); padding: 12px 10px; text-align: center; }
        .stat-num { font-size: 20px; font-weight: 700; }
        .stat-lbl { font-size: 10px; color: var(--c-muted); margin-top: 2px; }
        .stat-num.blue { color: var(--c-blue-l); }
        .stat-num.gold { color: var(--c-gold); }
        .stat-num.green { color: var(--c-green-l); }

        /* RDV list */
        .rdv-list { display: flex; flex-direction: column; gap: 8px; }
        .rdv-item { display: flex; align-items: center; gap: 12px; background: var(--c-card2); border-radius: var(--radius-sm); padding: 12px 14px; cursor: pointer; transition: opacity .15s; }
        .rdv-item.active { opacity: .7; }
        .rdv-item.new-rdv { border: 1px dashed rgba(201,168,76,.35); }
        .rdv-time { font-size: 15px; font-weight: 700; min-width: 40px; }
        .rdv-info { flex: 1; }
        .rdv-name { font-size: 14px; font-weight: 600; }
        .rdv-meta { font-size: 12px; color: var(--c-muted); margin-top: 1px; }
        .rdv-badge { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 20px; white-space: nowrap; }
        .badge-chr { background: rgba(91,156,246,0.15); color: var(--c-blue-l); }
        .badge-gms { background: rgba(201,168,76,0.15); color: var(--c-gold); }
        .badge-exp { background: rgba(76,175,129,0.15); color: var(--c-green-l); }

        /* Map */
        #map-matin, #map-rdv { width: 100%; height: 220px; border-radius: var(--radius-sm); margin-bottom: 12px; z-index: 1; }
        .map-wrap-full { margin: 0 16px 12px; }
        .leaflet-container { background: #1a2535; }
        .rdv-popup h4 { margin: 0 0 2px; font-size: 13px; color: #111; }
        .rdv-popup p { margin: 0; font-size: 11px; color: #555; }

        /* Brief */
        .brief-block { background: linear-gradient(135deg, rgba(201,168,76,.08), rgba(201,168,76,.02)); border: 1px solid rgba(201,168,76,.2); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; }
        .brief-client-name { font-size: 16px; font-weight: 700; margin-bottom: 10px; }
        .brief-row { display: flex; justify-content: space-between; align-items: baseline; padding: 5px 0; border-bottom: 1px solid var(--c-border); font-size: 13px; }
        .brief-row:last-child { border-bottom: none; }
        .brief-label { color: var(--c-muted); }
        .brief-val { font-weight: 600; }
        .brief-target { color: var(--c-gold); }

        /* Progress */
        .progress-wrap { margin-top: 8px; }
        .progress-lbl { display: flex; justify-content: space-between; font-size: 12px; color: var(--c-muted); margin-bottom: 5px; }
        .progress-bar { height: 5px; background: var(--c-border); border-radius: 5px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 5px; }

        /* Stock */
        .stock-list { display: flex; flex-direction: column; gap: 6px; }
        .stock-row { display: flex; align-items: center; justify-content: space-between; background: var(--c-card2); border-radius: var(--radius-sm); padding: 10px 12px; }
        .stock-name { font-size: 13px; font-weight: 600; }
        .stock-year { font-size: 11px; color: var(--c-muted); }
        .stock-count { font-size: 14px; font-weight: 700; }
        .stock-bar { height: 4px; border-radius: 4px; margin-top: 4px; }
        .stock-avail { background: var(--c-green-l); }
        .stock-low { background: var(--c-gold); }

        /* Actions */
        .actions-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
        .action-btn { padding: 13px 10px; border: 1px solid var(--c-border); background: var(--c-card2); border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; color: var(--c-text); cursor: pointer; text-align: center; transition: all .2s; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .action-btn:active { opacity: .7; transform: scale(.97); }
        .action-btn.primary { background: linear-gradient(135deg, var(--c-red), var(--c-red-l)); border-color: transparent; grid-column: span 2; }
        .action-btn.gold-btn { background: rgba(201,168,76,.12); border-color: rgba(201,168,76,.25); color: var(--c-gold-l); }
        .action-btn.green-btn { background: rgba(76,175,129,.12); border-color: rgba(76,175,129,.25); color: var(--c-green-l); }
        .action-btn.blue-btn { background: rgba(91,156,246,.12); border-color: rgba(91,156,246,.25); color: var(--c-blue-l); }

        /* Debrief */
        .debrief-item { background: var(--c-card2); border-radius: var(--radius-sm); padding: 14px; margin-bottom: 8px; border-left: 3px solid var(--c-green-l); }
        .debrief-item.pending { border-left-color: var(--c-gold); }
        .debrief-name { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
        .debrief-text { font-size: 13px; color: var(--c-muted); line-height: 1.5; }
        .debrief-actions { display: flex; gap: 8px; margin-top: 10px; }
        .d-btn { flex: 1; padding: 8px; border-radius: 8px; border: 1px solid var(--c-border); background: transparent; color: var(--c-text); font-size: 12px; font-weight: 600; cursor: pointer; text-align: center; }
        .d-btn.ok { background: rgba(76,175,129,.15); border-color: rgba(76,175,129,.3); color: var(--c-green-l); }

        /* Suivis */
        .suivi-item { display: flex; gap: 10px; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid var(--c-border); }
        .suivi-item:last-child { border-bottom: none; }
        .suivi-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
        .suivi-dot.urgent { background: var(--c-red-l); }
        .suivi-dot.normal { background: var(--c-gold); }
        .suivi-title { font-size: 13px; font-weight: 600; }
        .suivi-when { font-size: 11px; color: var(--c-muted); }

        /* Voice */
        .voice-btn { width: 64px; height: 64px; border-radius: 50%; margin: 16px auto; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--c-green), var(--c-green-l)); font-size: 28px; cursor: pointer; animation: pulse 2s infinite; box-shadow: 0 0 0 0 rgba(76,175,129,.4); }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(76,175,129,.4); } 70% { box-shadow: 0 0 0 14px rgba(76,175,129,0); } 100% { box-shadow: 0 0 0 0 rgba(76,175,129,0); } }

        /* Status */
        .status-bar { display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: var(--c-muted); padding: 8px 0 0; border-top: 1px solid var(--c-border); margin-top: 4px; }

        /* Map legend */
        .map-legend { display: flex; gap: 16px; font-size: 11px; color: var(--c-muted); padding: 4px 0 8px; }
        .leg-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 4px; vertical-align: middle; }

        /* Modal Brief */
        .modal-overlay { position: fixed; inset: 0; z-index: 9999; background: rgba(0,0,0,0.75); backdrop-filter: blur(6px); display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .25s; }
        .modal-overlay.open { opacity: 1; pointer-events: all; }
        .modal-sheet { background: var(--c-card); border: 1px solid var(--c-border); border-radius: 22px 22px 0 0; padding: 0 0 32px; width: 100%; max-width: 480px; transform: translateY(100%); transition: transform .3s cubic-bezier(.32,.72,0,1); max-height: 90vh; overflow-y: auto; }
        .modal-overlay.open .modal-sheet { transform: translateY(0); }
        .modal-handle { width: 40px; height: 4px; background: rgba(255,255,255,0.15); border-radius: 4px; margin: 12px auto 0; }
        .modal-header { padding: 16px 20px 12px; border-bottom: 1px solid var(--c-border); }
        .modal-title { font-size: 18px; font-weight: 700; }
        .modal-sub { font-size: 12px; color: var(--c-muted); margin-top: 2px; }
        .modal-close { position: absolute; top: 14px; right: 16px; width: 30px; height: 30px; border-radius: 50%; background: rgba(255,255,255,0.08); border: none; color: var(--c-text); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .modal-header { position: relative; }
        .modal-body { padding: 16px 20px; }
        .modal-section-title { font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: var(--c-muted); margin: 14px 0 8px; display: flex; align-items: center; gap: 6px; }
        .modal-section-title::before { content: ''; display: block; width: 3px; height: 12px; border-radius: 3px; background: var(--c-gold); }
        .modal-badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 20px; margin-bottom: 8px; }
        .modal-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 16px; }

        /* Modal Ajout RDV */
        .fab { position: fixed; bottom: 24px; right: 20px; z-index: 998; width: 52px; height: 52px; border-radius: 50%; background: linear-gradient(135deg, var(--c-red), var(--c-red-l)); border: none; font-size: 24px; color: white; cursor: pointer; box-shadow: 0 4px 16px rgba(139,32,53,0.5); display: flex; align-items: center; justify-content: center; transition: transform .2s; }
        .fab:active { transform: scale(.92); }
        .modal-rdv-overlay { position: fixed; inset: 0; z-index: 9999; background: rgba(0,0,0,0.75); backdrop-filter: blur(6px); display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .25s; }
        .modal-rdv-overlay.open { opacity: 1; pointer-events: all; }
        .modal-rdv-sheet { background: var(--c-card); border: 1px solid var(--c-border); border-radius: 22px 22px 0 0; padding: 0 0 40px; width: 100%; max-width: 480px; transform: translateY(100%); transition: transform .3s cubic-bezier(.32,.72,0,1); max-height: 92vh; overflow-y: auto; }
        .modal-rdv-overlay.open .modal-rdv-sheet { transform: translateY(0); }

        /* Form */
        .form-group { margin-bottom: 14px; }
        .form-label { font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--c-muted); margin-bottom: 6px; display: block; }
        .form-input, .form-select, .form-textarea { width: 100%; padding: 12px 14px; background: var(--c-card2); border: 1px solid var(--c-border); border-radius: var(--radius-sm); color: var(--c-text); font-size: 14px; font-family: inherit; outline: none; transition: border-color .2s; -webkit-appearance: none; }
        .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--c-gold); }
        .form-textarea { resize: none; height: 72px; line-height: 1.5; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .type-btns { display: flex; gap: 8px; }
        .type-btn { flex: 1; padding: 9px 6px; border: 1px solid var(--c-border); background: var(--c-card2); color: var(--c-muted); border-radius: 22px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all .2s; text-align: center; }
        .type-btn.sel-chr { background: rgba(91,156,246,.2); border-color: rgba(91,156,246,.5); color: var(--c-blue-l); }
        .type-btn.sel-gms { background: rgba(201,168,76,.2); border-color: rgba(201,168,76,.5); color: var(--c-gold); }
        .type-btn.sel-exp { background: rgba(76,175,129,.2); border-color: rgba(76,175,129,.5); color: var(--c-green-l); }

        /* Suggestion list */
        .suggest-list { position: absolute; left: 0; right: 0; top: calc(100% + 4px); background: var(--c-card); border: 1px solid rgba(201,168,76,.25); border-radius: var(--radius-sm); z-index: 10; overflow: hidden; display: none; }
        .suggest-item { padding: 10px 14px; font-size: 13px; cursor: pointer; border-bottom: 1px solid var(--c-border); transition: background .15s; }
        .suggest-item:last-child { border-bottom: none; }
        .suggest-item:hover, .suggest-item.active { background: var(--c-card2); }
        .sug-name { font-weight: 600; }
        .sug-meta { font-size: 11px; color: var(--c-muted); }
        .input-wrap { position: relative; }
    </style>
</head>
<body>
    <!-- SWITCHER -->
    <div class="switcher">
        <button class="sw-btn matin active" onclick="show('matin', this)">Matin</button>
        <button class="sw-btn rdv" onclick="show('rdv', this)">RDV</button>
        <button class="sw-btn soir" onclick="show('soir', this)">Soir</button>
    </div>

    <!-- FAB Add RDV -->
    <button class="fab" id="fab-btn" onclick="openAddRdv()" title="Ajouter un RDV">+</button>

    <!-- MATIN -->
    <div id="screen-matin" class="screen active">
        <div class="screen-header accent-matin">
            <div class="eyebrow">Bonjour Camille <span id="date-jour">Lundi 20 avril</span></div>
            <h1>Bonne journée</h1>
            <div class="sub">4 RDV Paris intramuros - 38 km</div>
        </div>
        <div class="pad">
            <div class="stats-row">
                <div class="stat-box"><div class="stat-num blue">4</div><div class="stat-lbl">RDV du jour</div></div>
                <div class="stat-box"><div class="stat-num gold">16 200</div><div class="stat-lbl">CA potentiel</div></div>
                <div class="stat-box"><div class="stat-num green">72</div><div class="stat-lbl">Obj. mensuel</div></div>
            </div>
            <!-- MAP TOURNE -->
            <div class="map-wrap-full">
                <div id="map-matin"></div>
            </div>
            <div class="map-legend">
                <span><span class="leg-dot" style="background:#5b9cf6"></span>CHR</span>
                <span><span class="leg-dot" style="background:#c9a84c"></span>GMS</span>
                <span><span class="leg-dot" style="background:#4caf81"></span>Export</span>
                <span><span class="leg-dot" style="background:#c0394e"></span>Ta position</span>
            </div>
            <div class="card blue">
                <div class="card-title">Agenda du jour</div>
                <div class="rdv-list" id="rdv-list-matin">
                    <!-- RDV dynamiques ici -->
                </div>
            </div>
            <div class="card gold">
                <div class="card-title">Brief Caves du Marais</div>
                <!-- ... brief statique ... -->
            </div>
            <!-- Actions, status... -->
        </div>
    </div>

    <!-- RDV SCREEN (similaire, avec id="rdv-list-rdv") -->
    <!-- SOIR SCREEN (avec id="rdv-list-soir") -->

    <!-- MODAL BRIEF CLIENT -->
    <!-- MODAL AJOUT RDV -->

    <script>
        // Données clients Paris (exemple)
        const clients = [ /* ... tes données clients ... */ ];

        let rdvList = []; // Liste persistante des RDV
        let mapMatin = null, mapRdv = null;
        let selectedType = 'chr';

        // === PERSISTANCE LOCALSTORAGE ===
        function loadRdv() {
            const saved = localStorage.getItem('rdvList');
            if (saved) {
                rdvList = JSON.parse(saved);
                renderAllRdv();
            } else {
                // RDV par défaut du matin
                rdvList = [ /* tes 4 RDV initiaux */ ];
                saveRdv();
            }
        }

        function saveRdv() {
            localStorage.setItem('rdvList', JSON.stringify(rdvList));
        }

        // === DATE DYNAMIQUE ===
        function getDateJour() {
            const now = new Date();
            const frDays = ['Dimanche', 'Lundi', 'Mardi', 'Mercredi', 'Jeudi', 'Vendredi', 'Samedi'];
            const frMonths = ['janvier', 'février', 'mars', 'avril', 'mai', 'juin', 'juillet', 'août', 'septembre', 'octobre', 'novembre', 'décembre'];
            const day = frDays[now.getDay()];
            const date = now.getDate();
            const month = frMonths[now.getMonth()];
            document.getElementById('date-jour').textContent = `${day} ${date} ${month}`;
        }

        // === RENDER RDV DANS TOUTES VUES ===
        function renderAllRdv() {
            const views = ['matin', 'rdv', 'soir'];
            views.forEach(view => {
                const list = document.getElementById(`rdv-list-${view}`);
                if (list) list.innerHTML = '';
                rdvList
                    .filter(rdv => matchesView(rdv, view)) // Filtre par vue/heure
                    .sort((a, b) => parseTime(a.heure) - parseTime(b.heure))
                    .forEach(rdv => appendRdvItem(list, rdv));
            });
        }

        function matchesView(rdv, view) {
            const heure = parseTime(rdv.heure);
            if (view === 'matin') return heure < 14; // Avant 14h
            if (view === 'soir') return heure >= 18; // Après 18h
            return true; // RDV: tout
        }

        function parseTime(str) {
            const [h, m] = str.replace('h', '').split('h').map(Number);
            return h * 60 + m;
        }

        function appendRdvItem(list, rdv) {
            const item = createRdvItem(rdv);
            list.appendChild(item);
            // Flash new
            if (rdv.new) {
                item.style.background = 'rgba(76,175,129,0.12)';
                setTimeout(() => item.style.background = '', 1200);
            }
        }

        // === AJOUT RDV AMELIORE ===
        function addRdv() {
            const client = document.getElementById('rdv-client').value.trim();
            const heure = document.getElementById('rdv-heure').value || '11:00';
            const adresse = document.getElementById('rdv-adresse').value.trim();
            const objectif = document.getElementById('rdv-objectif').value.trim();
            if (!client) return;

            const newRdv = {
                name: client,
                type: selectedType,
                heure,
                sub: `${adresse} Paris`,
                obj: objectif,
                note: 'RDV ajouté manuellement',
                new: true
            };
            rdvList.push(newRdv);
            saveRdv();
            renderAllRdv(); // Refresh toutes vues
            closeAddRdv();
            // Reset form
        }

        // === AUTRES FONCTIONS (show, openModal, maps, etc.) ===
        // ... (garde tes fonctions existantes, ajoute renderAllRdv() dans show() et init)

        // Init
        window.addEventListener('load', () => {
            getDateJour();
            loadRdv();
            // initMaps();
        });
    </script>
</body>
</html>
