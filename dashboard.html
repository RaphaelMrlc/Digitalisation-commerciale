<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- ═══ PWA SUPPORT ═══ -->
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <meta name="theme-color" content="#0f0a0e">
  <title>Dashboard Directeur Commercial — Domaine</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg:#0f0a0e; --bg2:#140e12; --card:#1c1219; --card2:#241820;
      --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.12);
      --gold:#c9a84c; --gold-l:#f0d080; --gold-dim:rgba(201,168,76,0.12);
      --red:#8b2035; --red-l:#c0394e; --red-dim:rgba(192,57,78,0.12);
      --green:#2e7d52; --green-l:#4caf81; --green-dim:rgba(76,175,129,0.12);
      --blue:#1e4a8b; --blue-l:#5b9cf6; --blue-dim:rgba(91,156,246,0.12);
      --text:#f0e8e0; --muted:rgba(240,232,224,0.45); --muted2:rgba(240,232,224,0.25);
      --r:12px; --r-sm:8px;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
    /* ... [TOUT TON CSS ORIGINAL ...] ... */
    /* Ajout CSS bouton push */
    .push-btn { padding:8px 12px;border:1px solid var(--border);background:var(--card);color:var(--text);border-radius:8px;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:4px;transition:opacity .2s; }
    .push-btn:hover { opacity:0.8; }
    .push-btn.active { background:var(--gold-dim); border-color:var(--gold); color:var(--gold-l); }
  </style>
</head>
<body>

<!-- ═══ TOP NAV avec BOUTON PUSH AJOUTÉ ═══ -->
<nav class="topnav">
  <div class="nav-brand">
    <div class="logo">🍷</div>
    <div>
      <h1>Domaine XYZ</h1>
      <span>Dashboard Directeur Commercial</span>
    </div>
  </div>
  <div class="nav-right">
    <div class="nav-period">
      <button class="period-btn" onclick="setPeriod(this,'sem')">Semaine</button>
      <button class="period-btn active" onclick="setPeriod(this,'mois')">Mois</button>
      <button class="period-btn" onclick="setPeriod(this,'trim')">Trimestre</button>
    </div>
    <div class="alert-dot" title="3 alertes actives"></div>
    <!-- ═══ BOUTON PUSH AJOUTÉ ═══ -->
    <button class="push-btn" id="pushTest" onclick="testPush()" title="Tester notifications push">🔔 Push</button>
    <button class="nav-btn" onclick="alert('Export PDF généré !')">📤 Export</button>
  </div>
</nav>

<div class="main">
  <!-- ═══ TOUT TON CONTENU DASHBOARD ORIGINAL ═══ -->
  <!-- KPIs, Team, Alerts, Pipeline, etc. (copie-colle de ton paste.txt) -->
  <div class="grid-4">
    <!-- Tes 4 KPIs existants -->
  </div>
  <!-- ... reste de ton HTML ... -->
</div>

<!-- ═══ SCRIPT COMPLET (TON JS + PWA) ═══ -->
<script>
  // ═══ TES FONCTIONS ORIGINALES ═══
  function setPeriod(btn, period) {
    document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    // ta logique...
  }
  function showModal(type) { /* ta logique modals */ }
  // ... toutes tes autres fonctions ...

  // ═══ NOUVEAU : PWA + PUSH ═══
  let isSubscribed = false;

  async function registerSW() {
    if ('serviceWorker' in navigator) {
      try {
        const reg = await navigator.serviceWorker.register('./sw.js', { scope: './' });
        console.log('✅ SW enregistré:', reg.scope);
        initPush(reg);
        return reg;
      } catch (err) {
        console.error('❌ Erreur SW:', err);
        alert('Service Worker non supporté sur ce navigateur');
      }
    }
  }

  async function initPush(reg) {
    const sub = await reg.pushManager.getSubscription();
    if (sub) {
      isSubscribed = true;
      document.getElementById('pushTest').textContent = '🔔 OK';
      document.getElementById('pushTest').classList.add('active');
    }
  }

  async function testPush() {
    const reg = await registerSW();
    if (!reg) return;

    const perm = await Notification.requestPermission();
    if (perm !== 'granted') {
      alert('❌ Active les notifications dans Safari');
      return;
    }

    // Test notification IMMÉDIATE (fonctionne sans backend)
    const options = {
      body: '🔔 Test Dashboard Domaine XYZ\nNouvelle alerte push reçue !',
      icon: './icon-192.png',
      badge: './icon-192.png',
      vibrate: [100, 50, 100],
      data: { url: './dashboard.html' },
      actions: [{ action: 'open', title: 'Ouvrir Dashboard' }]
    };

    reg.showNotification('🔔 Dashboard Actif', options);
    console.log('📱 Notification test envoyée !');
  }

  // Auto-init au load
  window.addEventListener('load', () => {
    registerSW();
    // tes init existants...
  });
</script>

</body>
</html>
